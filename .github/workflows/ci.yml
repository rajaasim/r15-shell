name: ci

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: r15-shell-linux
            binary_path: target/release/r15-shell
            binary_name: r15-shell
          - os: macos-latest
            artifact_name: r15-shell-macos
            binary_path: target/release/r15-shell
            binary_name: r15-shell
          - os: windows-latest
            artifact_name: r15-shell-windows
            binary_path: target/release/r15-shell.exe
            binary_name: r15-shell.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package build folder
        shell: pwsh
        run: |
          $buildDir = Join-Path "build" "${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Copy-Item "${{ matrix.binary_path }}" (Join-Path $buildDir "${{ matrix.binary_name }}")
          Copy-Item "README.md" (Join-Path $buildDir "README.md")
          Copy-Item "LICENSE" (Join-Path $buildDir "LICENSE")

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.artifact_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p release-builds/r15-shell-linux
          mkdir -p release-builds/r15-shell-macos
          mkdir -p release-builds/r15-shell-windows
          gh run download "$GITHUB_RUN_ID" -n r15-shell-linux -D release-builds/r15-shell-linux
          gh run download "$GITHUB_RUN_ID" -n r15-shell-macos -D release-builds/r15-shell-macos
          gh run download "$GITHUB_RUN_ID" -n r15-shell-windows -D release-builds/r15-shell-windows

      - name: Create release archives
        shell: bash
        run: |
          mkdir -p dist
          cd release-builds
          zip -r ../dist/r15-shell-linux.zip r15-shell-linux
          zip -r ../dist/r15-shell-macos.zip r15-shell-macos
          zip -r ../dist/r15-shell-windows.zip r15-shell-windows

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.zip --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zip --generate-notes
          fi
